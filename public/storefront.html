<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng hoa</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="admin.html">
            <img src="./assets/images/logo.png" alt="Florist Shop Logo" class="main-logo">
            </a>
        </div>
        <div class="search-section">
            <input type="text" placeholder="Tìm kiếm nhanh...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </header>
  
    <nav>
    <a href="admin.html">Dashboard</a>
    <a href="order.html">Đơn Hàng</a>
    <a href="flower.html">Quản lý Hoa</a>
    <a href="inventory.html">Kho Hàng</a>
    <a href="customer.html">Khách Hàng</a>
    <a href="storefront.html">Cửa Hàng</a>
    <div class="dropdown">
        <button class="dropbtn">TÀI KHOẢN ▼</button>
        <div class="dropdown-content">
            <a href="profile.html">Thông tin cá nhân</a>
            <a href="#" onclick="logout()">Đăng xuất</a>
        </div>
    </div>
</nav>

    <div class="main-content">
        <h1>Trang Cửa hàng & Đặt hoa</h1>
        <div id="storefront-view">
            <div class="storefront-filters">
                <select id="category-filter">
                    <option value="">Tất cả chủ đề</option>
                    <option value="Hoa sinh nhật">Hoa sinh nhật</option>
                    <option value="Hoa khai trương">Hoa khai trương</option>
                    <option value="Hoa tình yêu">Hoa tình yêu</option>
                    <option value="Khác">Khác</option>
                </select>
                <button class="btn btn-edit" id="filter-btn">Lọc</button>
                <button class="btn btn-delete" id="reset-btn">Xóa lọc</button>
            </div>

            <div id="flower-grid" class="flower-grid"></div>
        </div>

        <div id="checkout-view" style="display: none;">
            <button class="btn btn-edit" style="margin-bottom: 20px;" onclick="toggleCartView()"><i class="fas fa-arrow-left"></i> Tiếp tục mua sắm</button>
            
            <div class="order-form-wrapper">
                <h2>Giỏ hàng</h2>
                <div id="cart-empty">Giỏ hàng đang trống.</div>
                <table id="cart-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Tạm tính</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body"></tbody>
                </table>
                <p id="cart-total" style="font-weight: 700;"></p>
            </div>

            <div class="order-form-wrapper">
                <h2>Đặt Hoa</h2>
                <p>Thêm sản phẩm vào giỏ hàng, sau đó điền thông tin nhận hàng.</p>
                <form id="order-form">
                    <input type="text" id="fullName" placeholder="Tên người nhận/đặt" required>
                    <input type="text" id="phone" placeholder="Số điện thoại" required>
                    <input type="text" id="address" placeholder="Địa chỉ giao hàng" required>
                    <input type="datetime-local" id="deliveryTime">
                    <input type="text" id="cardMessage" placeholder="Lời ghi trên thiệp">
                    <button type="submit" class="btn btn-add">Đặt Hàng</button>
                </form>
                <p id="order-result"></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storefront.js"></script>
</body>
</html>
