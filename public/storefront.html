<body>
    <header>
        <div class="logo-container">
            <a href="admin.html">
            <img src="./assets/images/logo.png" alt="Florist Shop Logo" class="main-logo">
            </a>
        </div>
        <div class="search-section">
            <input type="text" placeholder="Tìm kiếm nhanh...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </header>
  
    <nav>
    <a href="admin.html">Dashboard</a>

    <a href="flower.html">Quản lý Hoa</a>
    <a href="inventory.html">Kho Hàng</a>
    <a href="customer.html">Khách Hàng</a>
    <a href="storefront.html">Cửa Hàng</a>
    <div class="dropdown">
        <button class="dropbtn">TÀI KHOẢN ▼</button>

            <a href="profile.html">Thông tin cá nhân</a>

        </div>

   <div class="main-content">
    <h1><i></i> Trang Cửa hàng </h1>

    <div class="form-container" style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px; padding: 15px;">
    <label style="margin:0; font-weight: bold;">Chủ đề hoa:</label>
    <select id="categoryFilter" class="form-input" style="width: 200px;" onchange="filterFlowers()">
        <option value="all">Tất cả danh mục</option>
        <option value="Hoa sinh nhật">Hoa sinh nhật</option>
        <option value="Hoa khai trương">Hoa khai trương</option>
        <option value="Hoa chia buồn">Hoa chia buồn</option>
        <option value="Hoa cưới">Hoa cưới</option>
        <option value="Bó hoa tươi">Bó hoa tươi</option>
    </select>
    <span id="storeflowerCount" style="color: #666; font-size: 14px;">Đang hiển thị: 0 mẫu</span>
</div>

    <div id="flower-grid" class="flower-grid">
        </div>
</div>
