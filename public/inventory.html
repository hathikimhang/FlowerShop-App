<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kho Hàng - Zịt Florist</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-section">
            <div class="logo-circle"><img src="assets/images/logo-shop.svg" alt="Logo shop"></div>
            <div class="brand-name">Zịt Florist</div>
        </div>
        <div class="search-section">
            <input type="text" placeholder="Tìm lô hàng...">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="cart-section"><i class="fas fa-shopping-cart cart-icon"></i><span class="cart-count">0</span></div>
    </header>

    <nav>
        <a href="storefront.html">Cửa Hàng</a>
        <a href="admin.html">Dashboard</a>
        <a href="flower.html">Quản lý Hoa</a>
        <a href="order.html">Đơn Hàng</a>
        <a href="inventory.html" class="active">Kho Hàng</a>
        <a href="customer.html">Khách Hàng</a>
        <a href="#" onclick="logout()">Đăng xuất</a>
    </nav>

    <div class="main-content">
        <h1>🏠 Quản Lý Tồn Kho</h1>
        <table>
            <thead>
                <tr>
                    <th>Mã Lô</th>
                    <th>Số Lượng</th>
                    <th>Tình Trạng</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body"></tbody>
        </table>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/inventory.js"></script>
</body>
</html>
