<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hoa</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="admin.html">
                <img src="./assets/images/logo.png" alt="Logo" class="main-logo">
            </a>
        </div>
        <div class="search-section">
            <input type="text" id="quickSearch" placeholder="Tìm kiếm nhanh...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </header>

    <nav>
        <a href="admin.html">Dashboard</a>
        <a href="order.html">Đơn Hàng</a>
        <a href="flower.html" class="active">Quản lý Hoa</a>
        <a href="inventory.html">Kho Hàng</a>
        <a href="customer.html">Khách Hàng</a>
        <div class="dropdown">
            <button class="dropbtn">TÀI KHOẢN ▼</button>
            <div class="dropdown-content">
                <a href="profile.html">Thông tin cá nhân</a>
                <a href="#" onclick="logout()">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h1>Quản Lý Mẫu Hoa</h1>
        
        <div class="form-container" style="background: white; padding: 25px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <h3>Thêm mẫu hoa mới</h3>
            <input type="text" id="name" placeholder="Tên hoa">
            <input type="text" id="category" placeholder="Danh mục">
            <input type="number" id="price" placeholder="Giá tiền (VNĐ)">
            <input type="number" id="stock" placeholder="Số lượng tồn">
            <input type="file" id="imageFile" accept="image/*">
            <button class="btn btn-add" onclick="createFlower()">+ Thêm mới</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Tên Hoa</th>
                    <th>Ảnh</th>
                    <th>Danh Mục</th>
                    <th>Giá</th>
                    <th>Tồn Kho</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="flower-table-body"></tbody>
        </table>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Cập nhật hoa</h3>
            <input type="text" id="edit-name" placeholder="Tên hoa">
            <input type="text" id="edit-category" placeholder="Danh mục">
            <input type="number" id="edit-price" placeholder="Giá">
            <input type="number" id="edit-stock" placeholder="Tồn kho">
            <label>Thay đổi ảnh (không chọn nếu giữ nguyên):</label>
            <input type="file" id="edit-image" accept="image/*">
            <div class="modal-actions">
                <button class="btn btn-save" onclick="saveUpdate()">Lưu</button>
                <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
            </div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/flower.js"></script>
</body>
</html>
